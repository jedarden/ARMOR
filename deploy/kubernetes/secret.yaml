# ARMOR Secrets Template
# Copy this file to secret.yaml and fill in your values
# Then run: kubectl apply -f secret.yaml
#
# IMPORTANT: Do not commit this file with real values to git!
# Add secret.yaml to your .gitignore
#
# To generate a new MEK: openssl rand -hex 32
# To generate auth keys: openssl rand -hex 16 (access) and openssl rand -hex 32 (secret)
#
apiVersion: v1
kind: Secret
metadata:
  name: armor-secrets
type: Opaque
stringData:
  # B2 Region (e.g., us-east-005)
  b2-region: "us-east-005"

  # B2 Application Key ID
  # Create at: https://secure.backblaze.com/app_keys.html
  b2-access-key-id: "YOUR_B2_ACCESS_KEY_ID"

  # B2 Application Key
  b2-secret-access-key: "YOUR_B2_SECRET_ACCESS_KEY"

  # B2 Bucket Name
  bucket: "YOUR_BUCKET_NAME"

  # Cloudflare Domain (CNAME'd to B2 bucket)
  # e.g., armor-b2.example.com
  cf-domain: "YOUR_CLOUDFLARE_DOMAIN"

  # Master Encryption Key (32 bytes, hex-encoded = 64 chars)
  # Generate with: openssl rand -hex 32
  master-encryption-key: "YOUR_64_CHAR_HEX_MEK"

  # ARMOR Authentication Credentials
  # These are used by clients to authenticate to ARMOR (NOT B2 credentials)
  # Generate with: openssl rand -hex 16
  auth-access-key: "YOUR_AUTH_ACCESS_KEY"

  # Generate with: openssl rand -hex 32
  auth-secret-key: "YOUR_AUTH_SECRET_KEY"
