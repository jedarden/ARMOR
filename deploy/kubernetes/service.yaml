apiVersion: v1
kind: Service
metadata:
  name: armor
  labels:
    app: armor
spec:
  type: ClusterIP
  ports:
  - name: s3-api
    port: 9000
    targetPort: 9000
    protocol: TCP
  - name: admin-api
    port: 9001
    targetPort: 9001
    protocol: TCP
  selector:
    app: armor
---
# Headless service for StatefulSet compatibility (if needed)
apiVersion: v1
kind: Service
metadata:
  name: armor-headless
  labels:
    app: armor
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - name: s3-api
    port: 9000
    targetPort: 9000
    protocol: TCP
  - name: admin-api
    port: 9001
    targetPort: 9001
    protocol: TCP
  selector:
    app: armor
