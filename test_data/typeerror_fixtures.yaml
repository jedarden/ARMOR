# yaml.TypeError Message Format Test Fixtures
# This file contains test fixtures for various yaml.TypeError message formats
# found in the ARMOR codebase and yaml.v3 library

# Basic Type Tag Errors
basic_string_into_int: "line 10: cannot unmarshal !!str into int"
basic_seq_into_array: "yaml: line 15: cannot unmarshal !!seq into []string"
basic_map_into_struct: "line 20: cannot unmarshal !!map into struct"

# Column Information Errors
with_column: "line 10, column 5: cannot unmarshal !!str into int"
with_column_complex: "line 15, column 8: cannot unmarshal !!seq into []string"

# Field Path Errors
field_path_simple: "field server.port type mismatch: expected int, got string"
field_path_array: "field items[0].name type mismatch: expected string, got int"
field_path_nested: "field metadata.annotations.version type mismatch: expected string, got int"
field_path_cannot: "field items[0].name cannot unmarshal !!str into int"

# Expected/Got Format Errors
expected_got_basic: "expected int, got string"
expected_got_bool: "expected bool, got string"
expected_got_array: "expected []string, got int"

# Cannot Convert Format Errors
cannot_convert: "string cannot be converted to int"
cannot_convert_bool: "int cannot be converted to bool"

# Value Format Errors
with_value: "cannot unmarshal !!str `hello` into int"
with_value_number: "cannot unmarshal !!str `123abc` into float64"
with_value_quoted: "cannot unmarshal !!str 'world' into int"

# Complex Error Messages
complex_yaml_prefix: "error converting YAML to JSON: yaml: line 10: cannot unmarshal !!str into int"
complex_nested: "error converting YAML to JSON: yaml: line 15: cannot unmarshal !!seq into []string"

# Multiple Errors Format
multiple_errors: |
  yaml: unmarshal errors:
    line 5: cannot unmarshal !!seq into []string
    line 10: cannot unmarshal !!str into int

# Boolean Type Errors
bool_into_int: "line 20: cannot unmarshal !!bool into int"
string_into_bool: "line 25: cannot unmarshal !!str into bool"

# Complex Go Type Errors
complex_map_type: "cannot unmarshal !!map into map[string]int"
complex_array_type: "cannot unmarshal !!seq into []CustomType"
pointer_type: "cannot unmarshal !!str into *string"
channel_type: "line 5: cannot unmarshal !!str into chan int"
interface_type: "cannot unmarshal !!str into interface{}"

# Package-Qualified Type Errors
package_time: "cannot unmarshal !!str into time.Time"
package_http: "cannot unmarshal !!seq into []http.Response"
package_encoding: "cannot unmarshal !!map into encoding/json.RawMessage"

# Array Size Specifications
fixed_array: "cannot unmarshal !!seq into [10]string"
fixed_array_int: "cannot unmarshal !!seq into [5]int"

# Multiple Pointer Levels
double_pointer: "cannot unmarshal !!str into **string"
pointer_to_custom: "cannot unmarshal !!str into *CustomType"

# Channel Directionality
channel_basic: "cannot unmarshal !!str into chan int"
channel_receive: "expected <-chan string, got !!seq"
channel_send: "expected chan<- int, got !!float"

# Complex Map Types
map_interface: "field metadata type mismatch: expected map[string]interface{}, got !!map"
map_nested: "field config type mismatch: expected map[string][]int, got string"
map_complex_key: "field cache type mismatch: expected map[int]string, got !!map"

# Nested Array Types
nested_array: "cannot unmarshal !!seq into [][]string"
array_of_structs: "cannot unmarshal !!seq into []time.Time"
array_of_pointers: "cannot unmarshal !!seq into []*string"

# Line Number Variations
line_at_start: "10: cannot unmarshal !!str into int"
at_line_format: "error at line 25: cannot unmarshal !!str into int"
error_at_line: "error at line 30: cannot unmarshal !!str into int"

# No Line Number Errors
no_line_number: "cannot unmarshal !!map into struct"
no_line_unmarshal: "cannot unmarshal string into int"

# Quoted Type Errors
quoted_types: 'cannot unmarshal "string" into "int"'
quoted_single: "cannot unmarshal 'world' into int"

# Want/Got Format
want_got_basic: "want float64, got int"
want_got_string: "want string, got bool"

# Real-world yaml.v3 Errors (from actual yaml.v3 output)
real_world_1: "yaml: line 10: cannot unmarshal !!str `hello` into int"
real_world_2: "yaml: line 15: cannot unmarshal !!seq into []string"
real_world_3: "yaml: line 20: cannot unmarshal !!map into struct"
real_world_4: "line 5: cannot unmarshal !!seq into []string"
real_world_5: "line 10: cannot unmarshal !!str `hello` into int"

# Edge Cases
empty_error: ""
invalid_line: "line abc: cannot unmarshal !!str into int"
partial_error: "cannot unmarshal"
only_type_tag: "!!str"
only_field: "field server.port"

